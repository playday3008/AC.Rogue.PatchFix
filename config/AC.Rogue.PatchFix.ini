[Display]
; Aspect ratio override. Auto(0) = detect from game resolution.
; Accepts ratio like 21:9, 32:9, or decimal like 2.333
AspectRatio=0
; Monitor mode: Auto(0), Single(1), Multi(2)
; Also accepts: Triple (alias for Multi)
MultiMonitor=Auto

[UI]
; How much to stretch UI beyond 16:9 bounds (0.0 = no stretch, 1.0 = fill screen)
; Horizontal: for wider-than-16:9 (21:9, 32:9) — fill pillarbox area
StretchHorizontal=0.0
; Vertical: for narrower-than-16:9 (16:10, 4:3, 5:4) — fill letterbox area
StretchVertical=0.0

[FOV]
; FOV correction mode: Auto(0), VertPlus(1), HorPlus(2)
; Auto = Hor+ when narrower than 16:9, Vert+ otherwise
Mode=Auto
; Additional FOV multiplier applied on top (1.0 = default, >1.0 = wider)
Multiplier=1.0

[Language]
; Make all languages available regardless of purchase region.
; Requires language data files (sounddata, videos) to be present.
; Default: false
UnlockAll=true
; Override UI language (overrides registry value).
; Accepts name (English, French, Spanish, Polish, German, ChineseTrad, Hungarian,
; Italian, Japanese, Czech, Korean, Russian, Dutch, Danish, Norwegian, Swedish,
; Portuguese, Brazil, Finnish, Arabic, Mexican) or index (1-21). None(0) = don't override.
; Default: None
UILanguage=None

[Hooks]
; Toggle individual hooks at runtime (hot-reload supported)
; Accepts: true/false, yes/no, on/off, 1/0
GameState=true
ViewportFitting=true
ViewportScaling=true
DisplayDetection=true
FOVCorrection=true
LanguageUnlock=true
